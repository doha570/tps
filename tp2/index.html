<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'Inscription</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #faf5f0;
            color: #5c4d47;

            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        form {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #8c6b5d;
        }



        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="password"],
        input[list],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #d4aa97;
            box-shadow: 0 0 5px rgba(212, 170, 151, 0.4);
        }


        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-group label,
        .checkbox-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 8px;

        }

        input[type="file"] {
            padding: 5px 0;
        }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #c89f8d;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #b58976;
        }
    </style>
</head>

<body>

    <h1>Créer un compte</h1>

    <form action="#" method="POST">

        <fieldset>
            <legend>Informations Personnelles</legend>
            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" required title="Veuillez entrer votre nom">
            </div>
            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" required title="Veuillez entrer votre prénom">
            </div>
            <div class="form-group">
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required
                    title="Veuillez entrer une adresse email valide (ex: nom@domaine.com)"
                    placeholder="votre.email@exemple.com">
            </div>
            <div class="form-group">
                <label for="telephone">Téléphone :</label>
                <input type="tel" id="telephone" name="telephone" required
                    pattern="^(?:(?:\+|00)33|0)\s*[1-9](?:[\s.-]*\d{2}){4}$"
                    title="Veuillez entrer un numéro de téléphone français valide">
            </div>
            <div class="form-group">
                <label for="naissance">Date de naissance :</label>
                <input type="date" id="naissance" name="naissance" required autocomplete="bday"
                    title="Vous devez avoir au moins 18 ans">
                <small>Vous devez avoir au moins 18 ans pour vous inscrire.</small>
            </div>
            <div class="form-group">
                <label>Genre :</label>
                <div class="radio-group">
                    <label><input type="radio" name="genre" value="homme" required> Homme</label>
                    <label><input type="radio" name="genre" value="femme" required> Femme</label>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Sécurité</legend>
            <div class="form-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" required pattern="^(?=.*\d)(?=.*[A-Z]).{8,}$"
                    autocomplete="new-password"
                    title="Le mot de passe doit contenir au moins 8 caractères, dont au moins une majuscule et un chiffre.">
                <small>Min. 8 caractères, 1 majuscule, 1 chiffre.</small>
            </div>
            <div class="form-group">
                <label for="password_confirm">Confirmer le mot de passe :</label>
                <input type="password" id="password_confirm" name="password_confirm" required
                    autocomplete="new-password" title="Veuillez confirmer votre mot de passe à l'identique.">
            </div>
        </fieldset>

        <fieldset>
            <legend>Informations Complémentaires</legend>
            <div class="form-group">
                <label for="pays">Pays de résidence :</label>
                <input list="pays-liste" id="pays" name="pays" required autocomplete="country"
                    title="Veuillez sélectionner ou taper un pays" placeholder="Sélectionnez un pays...">
                <datalist id="pays-liste">
                    <option value="France">
                    <option value="Belgique">
                    <option value="Suisse">
                    <option value="Canada">
                    <option value="Maroc">
                    <option value="Algérie">
                    <option value="Tunisie">
                    <option value="Sénégal">
                </datalist>
            </div>
            <div class="form-group">
                <label>Centres d'intérêt :</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="interet" value="technologie"> Technologie</label>
                    <label><input type="checkbox" name="interet" value="sport"> Sport</label>
                    <label><input type="checkbox" name="interet" value="musique"> Musique</label>
                    <label><input type="checkbox" name="interet" value="art"> Art & Culture</label>
                    <label><input type="checkbox" name="interet" value="voyage"> Voyage</label>
                </div>
            </div>
            <div class="form-group">
                <label for="bio">Biographie (max 500 caractères) :</label>
                <textarea id="bio" name="bio" rows="4" maxlength="500"
                    placeholder="Parlez-nous un peu de vous..."></textarea>
            </div>
            <div class="form-group">
                <label for="photo">Photo de profil :</label>
                <input type="file" id="photo" name="photo" accept="image/png, image/jpeg, image/webp" required
                    title="Veuillez télécharger une photo de profil">
            </div>
        </fieldset>

        <fieldset>
            <legend>Conditions d'utilisation</legend>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="cgu" name="cgu" required
                        title="Vous devez accepter les conditions générales d'utilisation pour continuer.">
                    J'accepte les conditions générales d'utilisation (CGU)
                </label>
            </div>
        </fieldset>

        <button type="submit">Créer mon compte</button>

    </form>

</body>

</html>
